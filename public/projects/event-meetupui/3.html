<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live City Pulse Map</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec37",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102213",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Pulse Animation for Markers */
        @keyframes pulse-ring {
            0% { transform: scale(0.33); }
            80%, 100% { opacity: 0; }
        }
        .ring-container {
            position: relative;
        }
        .circle {
            width: 15px;
            height: 15px;
            background-color: #13ec37;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            z-index: 2;
        }
        .ringring {
            border: 3px solid #13ec37;
            -webkit-border-radius: 30px;
            height: 30px;
            width: 30px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            -webkit-animation: pulsate 2s ease-out;
            -webkit-animation-iteration-count: infinite;
            opacity: 0.0;
            z-index: 1;
        }
        @keyframes pulsate {
            0% {-webkit-transform: translate(-50%, -50%) scale(0.1, 0.1); opacity: 0.0;}
            50% {opacity: 1.0;}
            100% {-webkit-transform: translate(-50%, -50%) scale(1.2, 1.2); opacity: 0.0;}
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#111812] overflow-hidden h-screen w-full flex flex-col">
<!-- Main Map Container -->
<div class="relative flex-1 w-full h-full overflow-hidden">
<!-- Map Background Layer -->
<!-- Using a placeholder to simulate map tiles -->

<!-- Green Zone: Well maintained path -->
<div class="absolute top-[30%] left-[20%] w-48 h-32 bg-primary/10 rounded-full blur-xl border border-primary/20 transform -rotate-12 pointer-events-none"></div>
<!-- Amber Zone: Construction (simulated with yellow tint) -->
<div class="absolute bottom-[40%] right-[10%] w-40 h-40 bg-yellow-400/10 rounded-full blur-xl border border-yellow-500/20 pointer-events-none"></div>
</div>
<!-- Markers Layer -->
<!-- Marker 1: Active Event -->
<div class="absolute top-[35%] left-[25%] cursor-pointer group z-10">
<div class="ring-container">
<div class="ringring"></div>
<div class="circle shadow-md"></div>
</div>
<div class="absolute top-6 left-1/2 transform -translate-x-1/2 bg-white dark:bg-neutral-800 px-2 py-1 rounded shadow text-[10px] font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                Clean-up Drive
            </div>
</div>
<!-- Marker 2: Active Run (Selected) -->
<div class="absolute top-[52%] left-[48%] cursor-pointer z-10">
<div class="ring-container">
<div class="ringring" style="animation-duration: 1.5s;"></div>
<div class="circle bg-primary scale-125 border-white shadow-lg"></div>
</div>
</div>
<!-- Marker 3: Static Point -->
<div class="absolute bottom-[30%] right-[30%] cursor-pointer z-10">
<div class="w-3 h-3 bg-white border-2 border-[#111812] rounded-full shadow-sm"></div>
</div>
<!-- Header / Search Layer -->
<div class="absolute top-0 left-0 right-0 z-30 flex flex-col pt-12 px-4 pb-4 bg-gradient-to-b from-white/95 via-white/80 to-transparent dark:from-background-dark/95 dark:via-background-dark/80 pointer-events-none">

</div>

</div>
</div>
</label>
</div>
<!-- Filter Chips -->
<div class="pointer-events-auto flex gap-2 overflow-x-auto hide-scrollbar pb-2 mask-linear-fade">
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary pl-4 pr-4 shadow-sm transition-transform active:scale-95">
<p class="text-[#111812] text-sm font-bold leading-normal">Events</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-neutral-800 border border-gray-100 dark:border-neutral-700 pl-4 pr-4 shadow-sm transition-transform active:scale-95">
<p class="text-[#111812] dark:text-white text-sm font-medium leading-normal">Clean-ups</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-neutral-800 border border-gray-100 dark:border-neutral-700 pl-4 pr-4 shadow-sm transition-transform active:scale-95">
<p class="text-[#111812] dark:text-white text-sm font-medium leading-normal">Runs</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-neutral-800 border border-gray-100 dark:border-neutral-700 pl-4 pr-4 shadow-sm transition-transform active:scale-95">
<p class="text-[#111812] dark:text-white text-sm font-medium leading-normal">Safety</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-neutral-800 border border-gray-100 dark:border-neutral-700 pl-4 pr-4 shadow-sm transition-transform active:scale-95">

</button>
</div>
</div>

<div class="absolute top-44 right-4 z-20 flex flex-col gap-3 pointer-events-auto">

</button>
</div>
<button class="flex size-10 items-center justify-center rounded-lg bg-white dark:bg-neutral-800 shadow-[0_2px_8px_rgba(0,0,0,0.1)] text-primary">
<span class="material-symbols-outlined text-[24px]">near_me</span>
</button>
<button class="flex size-10 items-center justify-center rounded-lg bg-white dark:bg-neutral-800 shadow-[0_2px_8px_rgba(0,0,0,0.1)] mt-2">
<span class="material-symbols-outlined text-[#111812] dark:text-white text-[24px]">layers</span>
</button>
</div>
<!-- Bottom Layers (Floating Content) -->
<div class="absolute bottom-0 left-0 right-0 z-40 flex flex-col justify-end pb-[80px] pointer-events-none bg-gradient-to-t from-white/20 to-transparent">
<!-- Secondary FAB: Share Update -->
<div class="flex justify-end px-4 mb-4 pointer-events-auto">
<button class="flex items-center justify-center rounded-full h-10 px-4 bg-white dark:bg-neutral-800 text-[#111812] dark:text-white shadow-[0_4px_12px_rgba(0,0,0,0.15)] gap-2 text-sm font-bold border border-gray-100 dark:border-neutral-700 transition-transform active:scale-95">
<span class="material-symbols-outlined text-[20px] text-primary">edit</span>
<span class="truncate">Share Update</span>

</div>
<!-- Event Preview Card -->

<div class="flex items-stretch justify-between gap-3 rounded-xl bg-white dark:bg-neutral-800 p-3 shadow-[0_8px_24px_rgba(0,0,0,0.12)] border border-gray-100 dark:border-neutral-700">
<div class="flex flex-[2_2_0px] flex-col justify-between gap-2">

<div class="flex items-center gap-1 mt-0.5">

</span>

</div>
<button class="flex w-fit cursor-pointer items-center justify-center overflow-hidden rounded-lg h-8 px-4 bg-[#f0f4f1] dark:bg-neutral-700 text-[#111812] dark:text-white text-sm font-bold leading-normal hover:bg-gray-200 transition-colors">

</div>
</div>
</div>
</div>

<div class="flex justify-between items-end">

<div class="relative">

<span class="absolute -top-0.5 -right-0.5 w-2 h-2 bg-primary rounded-full border border-white dark:border-neutral-900"></span>
</div>
<p class="text-[#111812] dark:text-white text-[10px] font-bold tracking-wide">Map</p>
</a>

</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-[#618968] hover:text-[#111812] dark:hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[28px]">groups</span>
