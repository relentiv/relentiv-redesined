<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Community Update Share</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Noto+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec37",
                        "primary-dark": "#0a9920", // Added for text contrast
                        "background-light": "#f6f8f6",
                        "background-dark": "#102213",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a331e",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(19, 236, 55, 0.1)',
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .symbol-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased transition-colors duration-200">
<div class="relative flex h-auto min-h-screen w-full flex-col mx-auto max-w-md bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between px-4 py-3 sticky top-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md supports-[backdrop-filter]:bg-background-light/60">
<button aria-label="Close" class="flex size-10 items-center justify-center rounded-full hover:bg-gray-200 dark:hover:bg-white/10 transition-colors text-slate-900 dark:text-white">
<span class="material-symbols-outlined text-[28px]">close</span>
</button>
<h2 class="text-slate-900 dark:text-white text-base font-bold tracking-tight">New Update</h2>
<button class="px-4 py-1.5 rounded-full bg-primary hover:bg-primary-dark hover:text-white text-background-dark text-sm font-bold transition-all shadow-sm">
                Post
            </button>
</div>
<div class="flex-1 overflow-y-auto w-full pb-10">
<!-- Hero Prompt -->
<div class="px-5 pt-4 pb-2">
<h1 class="text-slate-900 dark:text-white text-[32px] font-extrabold leading-[1.1] tracking-tight">
                    What did you <br/>
<span class="text-primary-dark dark:text-primary">notice today?</span>
</h1>
</div>
<!-- Location Pill -->
<div class="px-5 pb-6 pt-2">
<div class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 rounded-full shadow-sm">
<span class="material-symbols-outlined text-primary text-[18px] symbol-filled">near_me</span>
<span class="text-xs font-bold text-slate-700 dark:text-slate-200 tracking-wide uppercase">Indiranagar, Bengaluru</span>
</div>
</div>
<!-- Photo Upload (Empty State) -->
<div class="px-5 pb-8">
<div class="group relative flex flex-col items-center justify-center gap-4 rounded-2xl border-2 border-dashed border-gray-300 dark:border-gray-600 bg-white dark:bg-surface-dark h-56 w-full cursor-pointer transition-all hover:border-primary dark:hover:border-primary active:scale-[0.99] overflow-hidden">
<!-- Abstract Background Pattern for visual interest -->
<div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none bg-gradient-to-tr from-primary/5 via-transparent to-transparent"></div>
<div class="relative flex size-16 items-center justify-center rounded-full bg-background-light dark:bg-background-dark group-hover:scale-110 transition-transform duration-300 shadow-sm">
<span class="material-symbols-outlined text-3xl text-primary-dark dark:text-primary">add_a_photo</span>
</div>
<div class="relative flex flex-col items-center gap-1 text-center px-4">
<p class="text-slate-900 dark:text-white text-lg font-bold">Snap a photo</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Visuals help the community understand context.</p>
</div>
<!-- Button Overlay -->
<div class="absolute bottom-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<span class="bg-primary/20 text-primary-dark dark:text-primary px-3 py-1 rounded-full text-xs font-bold">Tap to upload</span>
</div>
</div>
</div>
<!-- Quick Categories Grid -->
<div class="px-5 pb-2">
<div class="flex items-center justify-between mb-4">
<h3 class="text-lg font-bold text-slate-900 dark:text-white">Quick Categories</h3>
<span class="text-xs font-semibold text-slate-400 dark:text-slate-500">SELECT ONE</span>
</div>
<div class="grid grid-cols-2 gap-3">
<!-- Card 1: Broken Footpath -->
<label class="cursor-pointer group relative flex flex-col gap-3 rounded-xl border border-gray-100 dark:border-gray-700 bg-white dark:bg-surface-dark p-4 shadow-sm hover:shadow-soft transition-all hover:-translate-y-0.5">
<input class="peer sr-only" name="category" type="radio"/>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 transition-all"></div>
<div class="relative size-10 flex items-center justify-center rounded-lg bg-orange-50 dark:bg-orange-900/20 text-orange-600 dark:text-orange-400 group-hover:bg-orange-100 dark:group-hover:bg-orange-900/30 transition-colors">
<span class="material-symbols-outlined">edit_road</span>
</div>
<span class="relative text-sm font-bold text-slate-900 dark:text-white">Broken Footpath</span>
</label>
<!-- Card 2: New Sapling (Positive) -->
<label class="cursor-pointer group relative flex flex-col gap-3 rounded-xl border border-gray-100 dark:border-gray-700 bg-white dark:bg-surface-dark p-4 shadow-sm hover:shadow-soft transition-all hover:-translate-y-0.5">
<input checked="" class="peer sr-only" name="category" type="radio"/>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 transition-all"></div>
<div class="relative size-10 flex items-center justify-center rounded-lg bg-primary/10 text-primary-dark dark:text-primary group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined symbol-filled">eco</span>
</div>
<span class="relative text-sm font-bold text-slate-900 dark:text-white">New Sapling</span>
</label>
<!-- Card 3: Great Road (Positive) -->
<label class="cursor-pointer group relative flex flex-col gap-3 rounded-xl border border-gray-100 dark:border-gray-700 bg-white dark:bg-surface-dark p-4 shadow-sm hover:shadow-soft transition-all hover:-translate-y-0.5">
<input class="peer sr-only" name="category" type="radio"/>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 transition-all"></div>
<div class="relative size-10 flex items-center justify-center rounded-lg bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 group-hover:bg-blue-100 dark:group-hover:bg-blue-900/30 transition-colors">
<span class="material-symbols-outlined">add_road</span>
</div>
<span class="relative text-sm font-bold text-slate-900 dark:text-white">Great Road</span>
</label>
<!-- Card 4: Traffic Alert -->
<label class="cursor-pointer group relative flex flex-col gap-3 rounded-xl border border-gray-100 dark:border-gray-700 bg-white dark:bg-surface-dark p-4 shadow-sm hover:shadow-soft transition-all hover:-translate-y-0.5">
<input class="peer sr-only" name="category" type="radio"/>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 transition-all"></div>
<div class="relative size-10 flex items-center justify-center rounded-lg bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 group-hover:bg-red-100 dark:group-hover:bg-red-900/30 transition-colors">
<span class="material-symbols-outlined">traffic</span>
</div>
<span class="relative text-sm font-bold text-slate-900 dark:text-white">Traffic Alert</span>
</label>
</div>
</div>
<!-- Description Input -->
<div class="px-5 py-6">
<div class="relative">
<textarea class="peer w-full rounded-xl border-0 bg-white dark:bg-surface-dark py-4 px-4 text-slate-900 dark:text-white shadow-sm ring-1 ring-inset ring-gray-200 dark:ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary text-sm leading-6 min-h-[100px] resize-none" id="note" placeholder="Add a quick note..."></textarea>
<div class="absolute bottom-2 right-2 pointer-events-none">
<span class="material-symbols-outlined text-gray-300 dark:text-gray-600 text-sm">edit</span>
</div>
</div>
</div>
<!-- Impact Footer -->
<div class="px-8 pb-8">
<div class="flex flex-col items-center justify-center text-center space-y-2 opacity-80">
<div class="flex items-center justify-center size-8 rounded-full bg-primary/10 text-primary-dark dark:text-primary mb-1">
<span class="material-symbols-outlined text-[18px]">volunteer_activism</span>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed max-w-[240px]">
                        Your update helps <span class="font-bold text-slate-800 dark:text-slate-200">5,000+ neighbors</span> stay informed and safe in Bengaluru.
                    </p>
</div>
</div>
</div>
</div>
</body></html>
